<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summer 2026 Journal</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fbf7f0;
      color: #1f1f1f;
      margin: 0;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #fbf7f0 0%, #eadbc8 100%);
      padding: 60px 8%;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    main {
      padding: 40px 8%;
      max-width: 1000px;
      margin: auto;
    }

    .top-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    button,
    .back-link {
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      background: #1f1f1f;
      color: white;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    .back-link {
      background: white;
      color: #1f1f1f;
      border: 1px solid #ddd;
    }

    .form-card,
    .entry-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 22px;
      border: 1px solid #f0ece5;
    }

    .form-card {
      display: none;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .entry-card h2 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .entry-card p {
      margin: 10px 0;
      color: #444;
    }

    .empty {
      color: #777;
      background: white;
      padding: 24px;
      border-radius: 20px;
      border: 1px dashed #d9c3aa;
    }

    .delete-btn {
      background: #d9c3aa;
      color: #1f1f1f;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>

<body>
  <header>
    <h1>Summer 2026</h1>
    <p>Track your hours, goals, and what you accomplished.</p>
  </header>

  <main>
    <div class="top-buttons">
      <a class="back-link" href="index.html">← Back to Homepage</a>
      <button onclick="toggleForm()">Add Entry</button>
      <button onclick="loadEntries()">Refresh Entries</button>
    </div>

    <section id="entryForm" class="form-card">
      <h2>Add New Entry</h2>

      <label for="entryDate">Date</label>
      <input type="date" id="entryDate">

      <label for="entryHours">Hours Spent</label>
      <input type="number" id="entryHours" min="0" step="0.25" placeholder="Example: 2.5">

      <label for="entryGoal">Goal</label>
      <input type="text" id="entryGoal" placeholder="Example: Finish website navigation">

      <label for="entryWork">What I Accomplished</label>
      <textarea id="entryWork" placeholder="Write what you did today..."></textarea>

      <br><br>
      <button onclick="saveEntry()">Save Entry</button>
    </section>

    <section>
      <h2>My Entries</h2>
      <div id="entriesDiv"></div>
    </section>
  </main>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycby7nCqUStt0mA3neW61U753x77mZygj1i1QSJcZ6MKNQfTe9Fuvsu96hSVHCY1E35nT6A/exec";
    const sheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSswrDLcF7fQyyeDQukjuzqe8SgVUnsbJf23NaQPsnD4Wnb7siD6HG0lK7VoLKq_Zbq0gtDWiihsm-5/pub?output=csv";

    function toggleForm() {
      const form = document.getElementById('entryForm');
      if (form.style.display === 'block') {
        form.style.display = 'none';
      } else {
        form.style.display = 'block';
      }
    }

    async function saveEntry() {
      const date = document.getElementById('entryDate').value;
      const hours = document.getElementById('entryHours').value;
      const goal = document.getElementById('entryGoal').value;
      const work = document.getElementById('entryWork').value;

      if (!date || !hours || !goal || !work) {
        alert('Please fill out date, hours, goal, and what you accomplished.');
        return;
      }

      try {
        await fetch(scriptURL, {
          method: 'POST',
         
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            date: date,
            hours: hours,
            goal: goal,
            work: work
          })
        });

        document.getElementById('entryDate').value = '';
        document.getElementById('entryHours').value = '';
        document.getElementById('entryGoal').value = '';
        document.getElementById('entryWork').value = '';

        document.getElementById('entryForm').style.display = 'none';

        alert('Entry saved! It may take a few seconds to appear.');
        setTimeout(loadEntries, 1500);
      } catch (error) {
        alert('Something went wrong. Please try again.');
      }
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
          if (value || row.length) {
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          }
          if (char === '\r' && nextChar === '\n') i++;
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function clean(value) {
      return value ? value.trim() : "";
    }

    async function loadEntries() {
      const entriesDiv = document.getElementById('entriesDiv');
      entriesDiv.innerHTML = '<div class="empty">Loading entries...</div>';

      try {
        const response = await fetch(sheetCSV);
        const text = await response.text();
        const rows = parseCSV(text);

        const dataRows = rows.slice(1).filter(row => row.some(cell => clean(cell)));

        if (dataRows.length === 0) {
          entriesDiv.innerHTML = '<div class="empty">No entries yet. Click Add Entry to start.</div>';
          return;
        }

        entriesDiv.innerHTML = '';

        dataRows.reverse().forEach(row => {
          const timestamp = clean(row[0]);
          const date = clean(row[1]) || timestamp;
          const hours = clean(row[2]);
          const goal = clean(row[3]);
          const work = clean(row[4]);

          entriesDiv.innerHTML += `
            <div class="entry-card">
              <h2>${date}</h2>
              <p><strong>Hours:</strong> ${hours}</p>
              <p><strong>Goal:</strong><br>${goal}</p>
              <p><strong>What I Accomplished:</strong><br>${work}</p>
            </div>
          `;
        });
      } catch (error) {
        entriesDiv.innerHTML = '<div class="empty">Could not load entries. Make sure your Google Sheet is published to the web.</div>';
      }
    }

    loadEntries();
  </script>
</body>
</html>
