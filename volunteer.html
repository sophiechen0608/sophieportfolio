<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Volunteer Experience</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fbf7f0;
      color: #1f1f1f;
      margin: 0;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #fbf7f0 0%, #eadbc8 100%);
      padding: 60px 8%;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    main {
      padding: 40px 8%;
      max-width: 1000px;
      margin: auto;
    }

    .top-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    button,
    .back-link {
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      background: #1f1f1f;
      color: white;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    .back-link {
      background: white;
      color: #1f1f1f;
      border: 1px solid #ddd;
    }

    .form-card,
    .entry-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin-bottom: 22px;
      border: 1px solid #f0ece5;
    }

    .form-card {
      display: none;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .entry-card h2 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .entry-card p {
      margin: 10px 0;
      color: #444;
    }

    .empty {
      color: #777;
      background: white;
      padding: 24px;
      border-radius: 20px;
      border: 1px dashed #d9c3aa;
    }

    .delete-btn {
      background: #d9c3aa;
      color: #1f1f1f;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Volunteer Experience</h1>
    <p>Track my volunteer organizations, hours, and service experiences.</p>
  </header>

  <main>

    <div class="top-buttons">
      <a class="back-link" href="index.html">← Back to Homepage</a>
      <button onclick="toggleForm()">Add Entry</button>
    </div>

    <section id="entryForm" class="form-card">

      <h2>Add Volunteer Entry</h2>

      <label for="entryDate">Date</label>
      <input type="date" id="entryDate">

      <label for="entryHours">Hours</label>
      <input
        type="number"
        id="entryHours"
        min="0"
        step="0.25"
        placeholder="Example: 3.5"
      >

      <label for="entryOrganization">Organization</label>
      <input
        type="text"
        id="entryOrganization"
        placeholder="Example: Local Food Bank"
      >

      <label for="entryDescription">Brief Description</label>
      <textarea
        id="entryDescription"
        placeholder="Briefly describe what you did..."
      ></textarea>

      <br><br>

      <button onclick="saveEntry()">Save Entry</button>

    </section>

    <section>
      <h2>My Volunteer Entries</h2>
      <div id="entriesDiv"></div>
    </section>

  </main>

  <script>

    /*
      We will replace these two lines with the volunteer
      Google Sheet links in the next steps.
    */

    const scriptURL = "https://script.google.com/macros/s/AKfycbwpxEXZ0u-YOdmWFvwSGJQF8vrKm9aJWNTY5VSADKTqCvnstObMOZ5IKzx__H8qEuHKwg/exec";

   const sheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS096I4Y562Cq7XKHm92F5vB4uHuIB9a_lxBpO9ywoGFcfKY79qpNfPCV1Q3nZgsXN0sEHSCaqr_nk0/pub?gid=0&single=true&output=csv";


    function toggleForm() {
      const form = document.getElementById("entryForm");

      if (form.style.display === "block") {
        form.style.display = "none";
      } else {
        form.style.display = "block";
      }
    }


    async function saveEntry() {
      const date = document.getElementById("entryDate").value;
      const hours = document.getElementById("entryHours").value;
      const organization =
        document.getElementById("entryOrganization").value.trim();
      const description =
        document.getElementById("entryDescription").value.trim();

      if (!date || !hours || !organization || !description) {
        alert(
          "Please fill out the date, hours, organization, and brief description."
        );
        return;
      }

      try {
        await fetch(scriptURL, {
          method: "POST",

          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },

          body: JSON.stringify({
            action: "add",
            date: date,
            hours: hours,
            organization: organization,
            description: description
          })
        });

        document.getElementById("entryDate").value = "";
        document.getElementById("entryHours").value = "";
        document.getElementById("entryOrganization").value = "";
        document.getElementById("entryDescription").value = "";

        document.getElementById("entryForm").style.display = "none";

        alert("Volunteer entry saved!");

        setTimeout(loadEntries, 1500);

      } catch (error) {
        alert("Something went wrong. Please try again.");
      }
    }


    async function deleteEntry(rowNumber) {
      const confirmed = confirm(
        "Are you sure you want to delete this volunteer entry?"
      );

      if (!confirmed) {
        return;
      }

      try {
        await fetch(scriptURL, {
          method: "POST",

          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },

          body: JSON.stringify({
            action: "delete",
            rowNumber: rowNumber
          })
        });

        alert("Entry deleted!");

        setTimeout(loadEntries, 1000);

      } catch (error) {
        alert("The entry could not be deleted. Please try again.");
      }
    }


    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          value += '"';
          i++;

        } else if (char === '"') {
          insideQuotes = !insideQuotes;

        } else if (char === "," && !insideQuotes) {
          row.push(value);
          value = "";

        } else if (
          (char === "\n" || char === "\r") &&
          !insideQuotes
        ) {
          if (value || row.length) {
            row.push(value);
            rows.push(row);

            row = [];
            value = "";
          }

          if (char === "\r" && nextChar === "\n") {
            i++;
          }

        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }


    function clean(value) {
      return value ? value.trim() : "";
    }


    function escapeHTML(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }


    async function loadEntries() {
      const entriesDiv = document.getElementById("entriesDiv");

      entriesDiv.innerHTML =
        '<div class="empty">Loading entries...</div>';

      if (
        sheetCSV === "PASTE_VOLUNTEER_CSV_URL_HERE"
      ) {
        entriesDiv.innerHTML =
          '<div class="empty">The volunteer Google Sheet still needs to be connected.</div>';

        return;
      }

      try {
        const response = await fetch(sheetCSV);
        const text = await response.text();
        const rows = parseCSV(text);

        const dataRows = rows
          .slice(1)
          .map((row, index) => ({
            row: row,
            rowNumber: index + 2
          }))
          .filter(item =>
            item.row.some(cell => clean(cell))
          );

        if (dataRows.length === 0) {
          entriesDiv.innerHTML =
            '<div class="empty">No volunteer entries yet. Click Add Entry to start.</div>';

          return;
        }

        entriesDiv.innerHTML = "";

        dataRows.reverse().forEach(item => {
          const row = item.row;
          const rowNumber = item.rowNumber;

          const date = escapeHTML(clean(row[1]));
          const hours = escapeHTML(clean(row[2]));
          const organization = escapeHTML(clean(row[3]));
          const description = escapeHTML(clean(row[4]));

          entriesDiv.innerHTML += `
            <div class="entry-card">
              <h2>${organization}</h2>

              <p>
                <strong>Date:</strong> ${date}
              </p>

              <p>
                <strong>Hours:</strong> ${hours}
              </p>

              <p>
                <strong>Brief Description:</strong><br>
                ${description}
              </p>

              <button
                class="delete-btn"
                onclick="deleteEntry(${rowNumber})"
              >
                Delete Entry
              </button>
            </div>
          `;
        });

      } catch (error) {
        entriesDiv.innerHTML =
          '<div class="empty">Could not load the volunteer entries.</div>';
      }
    }


    loadEntries();

  </script>

</body>
</html>
